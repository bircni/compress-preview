<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' __CSP_SOURCE__; style-src 'unsafe-inline' __CSP_SOURCE__;">
  <style>
    :root {
      --page-bg: var(--vscode-editor-background, #1e1e1e);
      --panel-border: var(--vscode-panel-border, rgba(255, 255, 255, 0.08));
      --panel-bg: var(--vscode-editorWidget-background, var(--page-bg));
      --panel-bg-strong: var(--vscode-sideBar-background, var(--page-bg));
      --panel-bg-soft: var(--vscode-editor-background, var(--page-bg));
      --muted: var(--vscode-descriptionForeground, #8b949e);
      --accent: var(--vscode-textLink-foreground, #4ea1ff);
      --accent-soft: color-mix(in srgb, var(--accent) 10%, transparent);
      --danger-soft: color-mix(in srgb, var(--vscode-errorForeground, #f14c4c) 16%, transparent);
      --success-soft: color-mix(in srgb, var(--vscode-testing-iconPassed, #73c991) 18%, transparent);
      --hover-bg: var(--vscode-list-hoverBackground, rgba(255, 255, 255, 0.05));
      --input-bg: var(--vscode-input-background, var(--panel-bg));
      --button-bg: var(--vscode-button-secondaryBackground, var(--panel-bg-strong));
      --button-fg: var(--vscode-button-secondaryForeground, var(--vscode-foreground));
      --button-hover: var(--vscode-button-secondaryHoverBackground, var(--button-bg));
      --primary-button-bg: var(--vscode-button-background, var(--accent));
      --primary-button-fg: var(--vscode-button-foreground, #ffffff);
      --primary-button-hover: var(--vscode-button-hoverBackground, var(--primary-button-bg));
      --radius-lg: 6px;
      --radius-md: 4px;
      --radius-sm: 2px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      color: var(--vscode-foreground, #d4d4d4);
      background: var(--page-bg);
      font-family: var(--vscode-font-family, system-ui, sans-serif);
      font-size: var(--vscode-font-size, 13px);
    }
    .shell {
      background: var(--page-bg);
    }
    .toolbarBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      min-height: 22px;
    }
    .toolbarTitle {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }
    .title {
      margin: 0;
      font-size: 13px;
      line-height: 1.3;
      font-weight: 600;
    }
    .statusPill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px;
      border-radius: var(--radius-md);
      border: 1px solid var(--panel-border);
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    .statusDot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-soft);
      animation: pulse 1.6s ease-in-out infinite;
    }
    .content {
      display: grid;
      gap: 8px;
      padding: 8px 12px 12px;
    }
    .toolbar {
      display: grid;
      gap: 8px;
    }
    .summary {
      color: var(--muted);
      font-size: 11px;
    }
    .buttonRow,
    .chipRow {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    button,
    .linkButton,
    .filterChip {
      appearance: none;
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-md);
      background: var(--button-bg);
      color: var(--button-fg);
      cursor: pointer;
      font: inherit;
      text-decoration: none;
      transition: border-color 120ms ease, background 120ms ease;
    }
    button:hover,
    .linkButton:hover,
    .filterChip:hover {
      background: var(--button-hover);
    }
    button,
    .linkButton {
      padding: 4px 10px;
    }
    .buttonPrimary {
      background: var(--primary-button-bg);
      border-color: transparent;
      color: var(--primary-button-fg);
    }
    .buttonPrimary:hover {
      background: var(--primary-button-hover);
    }
    .filterChip {
      padding: 2px 8px;
      color: var(--muted);
      font-size: 11px;
    }
    .filterChip.is-active {
      border-color: var(--vscode-focusBorder, var(--accent));
      background: var(--vscode-list-activeSelectionBackground, var(--panel-bg));
      color: var(--vscode-foreground, #d4d4d4);
    }
    .filterLabel {
      font-size: 11px;
      color: var(--muted);
      margin-right: 4px;
      align-self: center;
    }
    .searchRow {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 8px 12px;
      align-items: center;
    }
    .searchGroup {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .searchInput {
      width: min(420px, 100%);
      padding: 5px 8px;
      border: 1px solid var(--vscode-input-border, var(--panel-border));
      border-radius: var(--radius-md);
      background: var(--input-bg);
      color: inherit;
      font: inherit;
    }
    .searchInput::placeholder {
      color: var(--muted);
    }
    .actionsCompact button {
      padding: 3px 8px;
      font-size: 11px;
    }
    .panel {
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-md);
      background: var(--panel-bg-soft);
      overflow: hidden;
    }
    .state {
      margin: 0;
      padding: 14px 16px;
      line-height: 1.5;
    }
    #loading {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
    }
    #loading::before {
      content: "";
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid color-mix(in srgb, var(--accent) 30%, transparent);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
    }
    #error {
      display: none;
      color: var(--vscode-errorForeground);
      background: var(--danger-soft);
    }
    #empty {
      display: none;
      color: var(--muted);
    }
    #tree {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .row {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 6px 10px;
      border-top: 1px solid color-mix(in srgb, var(--panel-border) 70%, transparent);
      transition: background 120ms ease, color 120ms ease;
    }
    .row:hover {
      background: var(--hover-bg);
    }
    .rowMain {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .rowToggle {
      width: 18px;
      height: 18px;
      padding: 0;
      border-radius: var(--radius-sm);
      font-size: 10px;
      line-height: 1;
      flex: none;
    }
    .rowToggle.is-hidden {
      visibility: hidden;
      pointer-events: none;
    }
    .rowDot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      flex: none;
      background: var(--accent);
      box-shadow: none;
    }
    .row[data-kind="dir"] .rowDot {
      background: color-mix(in srgb, var(--muted) 80%, white 20%);
      box-shadow: none;
    }
    .rowLabel {
      min-width: 0;
      display: grid;
      gap: 2px;
    }
    .rowName,
    .rowNameButton {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .rowName {
      font-weight: 550;
    }
    .rowBadge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: 6px;
      padding: 1px 6px;
      border-radius: var(--radius-md);
      border: 1px solid var(--panel-border);
      background: transparent;
      color: var(--muted);
      font-size: 10px;
      vertical-align: middle;
    }
    .rowNameButton {
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--vscode-textLink-foreground, var(--vscode-foreground));
      text-align: left;
      cursor: pointer;
      font: inherit;
      font-weight: 550;
    }
    .rowNameButton:hover {
      text-decoration: underline;
      background: transparent;
    }
    .rowPath {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rowMeta {
      min-width: 0;
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rowActions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      flex-wrap: wrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease;
    }
    .row:hover .rowActions,
    .row:focus-within .rowActions {
      opacity: 1;
      pointer-events: auto;
    }
    .rowAction {
      padding: 1px 6px;
      font-size: 11px;
    }
    #partial {
      display: none;
      padding: 10px 12px;
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-md);
      background: var(--success-soft);
      color: var(--vscode-foreground);
      line-height: 1.5;
    }
    #partial.is-error {
      background: var(--danger-soft);
      color: var(--vscode-errorForeground);
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(0.86); opacity: 0.6; }
    }
    @media (max-width: 1120px) {
      .searchRow {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 860px) {
      .row {
        grid-template-columns: 1fr;
      }
      .rowMeta,
      .rowActions {
        text-align: left;
        justify-content: flex-start;
      }
      .rowActions {
        opacity: 1;
        pointer-events: auto;
      }
    }
    @media (max-width: 560px) {
      .content {
        padding: 8px;
      }
      .title {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="content">
      <div class="toolbar">
        <div class="toolbarBar">
          <div class="toolbarTitle">
            <h1 class="title">Archive contents</h1>
            <div id="summary" class="summary">Waiting for archive metadata...</div>
          </div>
          <div class="buttonRow actionsCompact">
            <button id="expandAllBtn" type="button" style="display:none;">Expand all</button>
            <button id="collapseAllBtn" type="button" style="display:none;">Collapse all</button>
            <button id="retryBtn" type="button" style="display:none;">Retry</button>
            <button id="extractAllBtn" class="buttonPrimary" type="button" style="display:none;">Extract all</button>
          </div>
        </div>
        <div class="searchRow">
          <div class="searchGroup">
            <input id="searchInput" class="searchInput" type="search" placeholder="Search files">
            <div class="chipRow" id="filterRow">
              <span class="filterLabel">View</span>
              <button class="filterChip is-active" type="button" data-filter="all">All</button>
              <button class="filterChip" type="button" data-filter="files">Files</button>
              <button class="filterChip" type="button" data-filter="folders">Folders</button>
              <button class="filterChip" type="button" data-filter="text">Text</button>
              <button class="filterChip" type="button" data-filter="binary">Binary</button>
            </div>
          </div>
          <div class="statusPill"><span class="statusDot"></span><span id="statusText">Preparing archive</span></div>
        </div>
      </div>
      </div>
      <div class="panel">
        <div id="loading" class="state">Loading archive contents...</div>
        <div id="error" class="state"></div>
        <div id="empty" class="state">No matching archive entries for the current filter.</div>
        <ul id="tree"></ul>
      </div>
      <div id="partial"></div>
    </div>
  </div>
  __INITIAL_SCRIPT__
  <script>
    var TEXT_EXTENSIONS = {
      txt: true, json: true, md: true, xml: true, html: true, htm: true, css: true, js: true,
      ts: true, jsx: true, tsx: true, log: true, yml: true, yaml: true, csv: true, json5: true,
      sh: true, bat: true, cmd: true, ps1: true, r: true, py: true, sql: true, env: true,
      ini: true, cfg: true, conf: true, text: true, rst: true, adoc: true
    };
    var vscode;
    try {
      vscode = acquireVsCodeApi();
    } catch (e) {}

    var treeEl = document.getElementById('tree');
    var errorEl = document.getElementById('error');
    var emptyEl = document.getElementById('empty');
    var loadingEl = document.getElementById('loading');
    var partialEl = document.getElementById('partial');
    var extractAllBtn = document.getElementById('extractAllBtn');
    var expandAllBtn = document.getElementById('expandAllBtn');
    var collapseAllBtn = document.getElementById('collapseAllBtn');
    var retryBtn = document.getElementById('retryBtn');
    var summaryEl = document.getElementById('summary');
    var statusTextEl = document.getElementById('statusText');
    var searchInput = document.getElementById('searchInput');
    var filterButtons = Array.prototype.slice.call(document.querySelectorAll('[data-filter]'));

    var allEntries = [];
    var rootNodes = [];
    var collapsedPaths = {};
    var activeFilter = 'all';
    var searchQuery = '';

    function formatSize(n) {
      if (n == null) return '';
      if (n < 1024) return n + ' B';
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
      return (n / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function formatMtime(m) {
      if (m == null) return '';
      var d = m instanceof Date ? m : new Date(m);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleString();
    }

    function escapeHtml(s) {
      if (s == null) return '';
      var div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function normalizePath(p) {
      return (p || '').replace(/\\/g, '/').replace(/^\.\//, '').replace(/\/$/, '');
    }

    function getExtension(entry) {
      var target = entry && entry.name ? entry.name : entry && entry.path ? entry.path : '';
      var idx = target.lastIndexOf('.');
      if (idx === -1 || idx === target.length - 1) return '';
      return target.slice(idx + 1).toLowerCase();
    }

    function isTextEntry(entry) {
      return !entry.isDirectory && (TEXT_EXTENSIONS[getExtension(entry)] || getExtension(entry) === '');
    }

    function compareEntries(a, b) {
      var aPath = normalizePath(a.path);
      var bPath = normalizePath(b.path);
      var aParts = aPath ? aPath.split('/') : [];
      var bParts = bPath ? bPath.split('/') : [];
      var maxLength = Math.max(aParts.length, bParts.length);

      for (var i = 0; i < maxLength; i += 1) {
        var aPart = aParts[i];
        var bPart = bParts[i];
        if (aPart == null) return -1;
        if (bPart == null) return 1;
        if (aPart !== bPart) {
          return aPart.localeCompare(bPart, undefined, { numeric: true, sensitivity: 'base' });
        }
      }

      if (a.isDirectory !== b.isDirectory) {
        return a.isDirectory ? -1 : 1;
      }

      return aPath.localeCompare(bPath, undefined, { numeric: true, sensitivity: 'base' });
    }

    function relativeParent(entry) {
      var normalized = normalizePath(entry.path);
      var idx = normalized.lastIndexOf('/');
      return idx === -1 ? 'Archive root' : normalized.slice(0, idx);
    }

    function getFolderSummary(node) {
      var totalItems = node.stats.descendantFiles + node.stats.descendantFolders;
      if (totalItems === 0) return 'Folder';
      return totalItems + ' item' + (totalItems === 1 ? '' : 's') + ' · '
        + node.stats.descendantFiles + ' file' + (node.stats.descendantFiles === 1 ? '' : 's');
    }

    function metaText(node) {
      var entry = node.entry;
      var parts = [];
      if (entry.isDirectory) {
        parts.push(getFolderSummary(node));
      } else if (isTextEntry(entry)) {
        parts.push('Text');
      } else {
        parts.push('Binary');
      }
      if (entry.size != null) parts.push(formatSize(entry.size));
      if (entry.compressedSize != null) parts.push('compressed ' + formatSize(entry.compressedSize));
      if (entry.mtime != null) parts.push(formatMtime(entry.mtime));
      return parts.join(' · ');
    }

    function createFolderEntry(folderPath) {
      var normalized = normalizePath(folderPath);
      var parts = normalized ? normalized.split('/') : [];
      var folderName = parts.length ? parts[parts.length - 1] : 'root';
      return {
        path: normalized + '/',
        name: folderName,
        isDirectory: true
      };
    }

    function createNode(entry, parentPath, synthetic) {
      return {
        key: normalizePath(entry.path),
        parentPath: parentPath,
        synthetic: synthetic,
        entry: entry,
        children: [],
        stats: {
          descendantFolders: 0,
          descendantFiles: 0,
          totalSize: 0,
          totalCompressedSize: 0
        }
      };
    }

    function ensureFolderNode(nodeMap, roots, folderPath) {
      var key = normalizePath(folderPath);
      if (!key) return null;
      if (nodeMap[key]) return nodeMap[key];

      var parentPath = key.indexOf('/') === -1 ? '' : key.slice(0, key.lastIndexOf('/'));
      var parentNode = ensureFolderNode(nodeMap, roots, parentPath);
      var node = createNode(createFolderEntry(key), parentPath, true);
      nodeMap[key] = node;
      if (parentNode) {
        parentNode.children.push(node);
      } else {
        roots.push(node);
      }
      return node;
    }

    function buildTree(entries) {
      var roots = [];
      var nodeMap = {};
      entries.slice().sort(compareEntries).forEach(function(rawEntry) {
        var normalizedPath = normalizePath(rawEntry.path || rawEntry.name || '');
        var parentPath = normalizedPath.indexOf('/') === -1 ? '' : normalizedPath.slice(0, normalizedPath.lastIndexOf('/'));
        var parentNode = ensureFolderNode(nodeMap, roots, parentPath);
        var entry = {
          path: rawEntry.path,
          name: rawEntry.name,
          isDirectory: rawEntry.isDirectory,
          size: rawEntry.size,
          compressedSize: rawEntry.compressedSize,
          mtime: rawEntry.mtime
        };
        var node = nodeMap[normalizedPath];
        if (!node) {
          node = createNode(entry, parentPath, false);
          nodeMap[normalizedPath] = node;
          if (parentNode) {
            parentNode.children.push(node);
          } else {
            roots.push(node);
          }
        } else {
          node.entry = entry;
          node.synthetic = false;
        }
      });

      function sortChildren(node) {
        node.children.sort(function(a, b) { return compareEntries(a.entry, b.entry); });
        node.children.forEach(sortChildren);
      }
      roots.sort(function(a, b) { return compareEntries(a.entry, b.entry); });
      roots.forEach(sortChildren);
      return roots;
    }

    function computeNodeStats(node) {
      var descendantFolders = 0;
      var descendantFiles = 0;
      var totalSize = node.entry.isDirectory ? 0 : (node.entry.size || 0);
      var totalCompressedSize = node.entry.isDirectory ? 0 : (node.entry.compressedSize || 0);

      node.children.forEach(function(child) {
        computeNodeStats(child);
        totalSize += child.stats.totalSize;
        totalCompressedSize += child.stats.totalCompressedSize;
        descendantFolders += (child.entry.isDirectory ? 1 : 0) + child.stats.descendantFolders;
        descendantFiles += (child.entry.isDirectory ? 0 : 1) + child.stats.descendantFiles;
      });

      node.stats = {
        descendantFolders: descendantFolders,
        descendantFiles: descendantFiles,
        totalSize: totalSize,
        totalCompressedSize: totalCompressedSize
      };
    }

    function matchesFilter(entry) {
      if (activeFilter === 'files') return !entry.isDirectory;
      if (activeFilter === 'folders') return entry.isDirectory;
      if (activeFilter === 'text') return isTextEntry(entry);
      if (activeFilter === 'binary') return !entry.isDirectory && !isTextEntry(entry);
      return true;
    }

    function matchesSearch(entry) {
      if (!searchQuery) return true;
      var haystack = ((entry.path || '') + '\n' + (entry.name || '')).toLowerCase();
      return haystack.indexOf(searchQuery) !== -1;
    }

    function getTreeState() {
      return {
        filtered: Boolean(searchQuery) || activeFilter !== 'all'
      };
    }

    function getVisibleNode(node, treeState) {
      var matchingChildren = [];
      node.children.forEach(function(child) {
        var childState = getVisibleNode(child, treeState);
        if (childState) {
          matchingChildren.push(childState);
        }
      });

      var ownMatch = matchesFilter(node.entry) && matchesSearch(node.entry);
      if (!ownMatch && matchingChildren.length === 0) {
        return null;
      }

      return {
        node: node,
        children: matchingChildren,
        forcedOpen: treeState.filtered && matchingChildren.length > 0
      };
    }

    function getVisibleTree() {
      var treeState = getTreeState();
      return rootNodes
        .map(function(node) { return getVisibleNode(node, treeState); })
        .filter(function(nodeState) { return Boolean(nodeState); });
    }

    function renderNodeRow(nodeState, level, treeState, counters) {
      var node = nodeState.node;
      var key = node.key;
      var isFolder = node.entry.isDirectory;
      var hasChildren = nodeState.children.length > 0;
      var isCollapsed = isFolder && !nodeState.forcedOpen && !treeState.filtered && collapsedPaths[key] === true;
      var actions = '';
      var badge = '';
      if (!isFolder) {
        actions += '<button class="rowAction" type="button" data-action="open" data-path="' + escapeHtml(node.entry.path) + '">Open</button>';
      }
      if (!node.synthetic) {
        actions += '<button class="rowAction" type="button" data-action="extract" data-path="' + escapeHtml(node.entry.path) + '">Extract</button>';
      }

      if (isFolder) {
        badge = '<span class="rowBadge">' + escapeHtml(getFolderSummary(node)) + '</span>';
      }

      counters.total += 1;
      if (!node.synthetic) {
        counters.realTotal += 1;
        if (isFolder) {
          counters.folders += 1;
        } else {
          counters.files += 1;
          counters.totalSize += node.entry.size || 0;
          counters.totalCompressed += node.entry.compressedSize || 0;
        }
      }

      var toggleMarkup = hasChildren || isFolder
        ? '<button class="rowToggle" type="button" data-action="toggle" data-path="' + escapeHtml(node.entry.path) + '">' + (isCollapsed ? '&#9654;' : '&#9662;') + '</button>'
        : '<button class="rowToggle is-hidden" type="button" aria-hidden="true"></button>';

      var nameMarkup = isFolder
        ? '<span class="rowName">' + escapeHtml((node.entry.name || node.entry.path || '') + '/') + badge + '</span>'
        : '<button class="rowNameButton" type="button" data-action="open" data-path="' + escapeHtml(node.entry.path) + '">' + escapeHtml(node.entry.name || node.entry.path || '') + '</button>';

      var html = ''
        + '<li class="row" data-kind="' + (isFolder ? 'dir' : 'file') + '" style="padding-left:' + (14 + level * 18) + 'px">'
        + '<div class="rowMain">'
        + toggleMarkup
        + '<span class="rowDot"></span>'
        + '<div class="rowLabel">'
        + nameMarkup
        + '<span class="rowPath">' + escapeHtml(relativeParent(node.entry)) + '</span>'
        + '</div>'
        + '</div>'
        + '<div class="rowMeta">' + escapeHtml(metaText(node)) + '</div>'
        + '<div class="rowActions">' + actions + '</div>'
        + '</li>';

      if (!isCollapsed) {
        nodeState.children.forEach(function(child) {
          html += renderNodeRow(child, level + 1, treeState, counters);
        });
      }
      return html;
    }

    function renderVisibleTree() {
      var visibleTree = getVisibleTree();
      var treeState = getTreeState();
      var counters = {
        total: 0,
        realTotal: 0,
        folders: 0,
        files: 0,
        totalSize: 0,
        totalCompressed: 0
      };
      var html = visibleTree.map(function(nodeState) {
        return renderNodeRow(nodeState, 0, treeState, counters);
      }).join('');
      return {
        html: html,
        counters: counters
      };
    }

    function updateSummary(counters) {
      var totalEntries = allEntries.length;
      if (!totalEntries) {
        setSummary('No entries found in this archive.');
        return;
      }
      var baseText = counters.realTotal === totalEntries && !searchQuery && activeFilter === 'all'
        ? totalEntries + ' entr' + (totalEntries === 1 ? 'y' : 'ies') + ' available'
        : 'Showing ' + counters.realTotal + ' of ' + totalEntries + ' entries';
      var details = [
        counters.folders + ' folder' + (counters.folders === 1 ? '' : 's'),
        counters.files + ' file' + (counters.files === 1 ? '' : 's'),
        formatSize(counters.totalSize) + ' unpacked',
        formatSize(counters.totalCompressed) + ' compressed'
      ];
      setSummary(baseText + ' · ' + details.join(' · '));
    }

    function clearMessages() {
      if (errorEl) {
        errorEl.style.display = 'none';
        errorEl.textContent = '';
      }
      if (partialEl) {
        partialEl.style.display = 'none';
        partialEl.className = '';
        partialEl.innerHTML = '';
      }
    }

    function setStatus(text) {
      if (statusTextEl) statusTextEl.textContent = text;
    }

    function setSummary(text) {
      if (summaryEl) summaryEl.textContent = text;
    }

    function showRetry(show) {
      if (retryBtn) retryBtn.style.display = show ? 'inline-flex' : 'none';
    }

    function updateFilterButtons() {
      filterButtons.forEach(function(button) {
        var isActive = button.getAttribute('data-filter') === activeFilter;
        button.classList.toggle('is-active', isActive);
      });
    }

    function updateFolderButtons() {
      var hasFolders = allEntries.some(function(entry) { return entry.isDirectory; });
      var treeState = getTreeState();
      var display = hasFolders ? 'inline-flex' : 'none';
      if (expandAllBtn) expandAllBtn.style.display = display;
      if (collapseAllBtn) collapseAllBtn.style.display = treeState.filtered ? 'none' : display;
    }

    function setAllFoldersCollapsed(nextCollapsed) {
      collapsedPaths = {};
      allEntries.forEach(function(entry) {
        if (entry.isDirectory) {
          collapsedPaths[normalizePath(entry.path)] = nextCollapsed;
        }
      });
    }

    function showResultMessage(kind, targetPath) {
      if (!partialEl) return;
      partialEl.style.display = 'block';
      partialEl.className = '';
      partialEl.textContent = kind + (targetPath ? ': ' + targetPath : '');
    }

    function bindRowActions() {
      treeEl.querySelectorAll('[data-action]').forEach(function(button) {
        button.addEventListener('click', function() {
          var action = button.getAttribute('data-action');
          var targetPath = button.getAttribute('data-path');
          if (!action || !targetPath) return;
          if (action === 'toggle') {
            var key = normalizePath(targetPath);
            collapsedPaths[key] = !collapsedPaths[key];
            renderEntries();
            return;
          }
          if (!vscode) return;
          if (action === 'open') {
            vscode.postMessage({ type: 'openEntry', path: targetPath });
          } else if (action === 'extract') {
            vscode.postMessage({ type: 'extractEntry', path: targetPath });
          }
        });
      });
    }

    function renderEntries() {
      clearMessages();
      var rendered = renderVisibleTree();
      if (loadingEl) loadingEl.style.display = 'none';
      if (emptyEl) emptyEl.style.display = rendered.counters.total ? 'none' : 'block';
      if (treeEl) treeEl.innerHTML = rendered.html;
      bindRowActions();
      updateSummary(rendered.counters);
      updateFolderButtons();
      if (extractAllBtn) extractAllBtn.style.display = allEntries.length ? 'inline-flex' : 'none';
      setStatus(allEntries.length ? 'Archive ready' : 'Archive is empty');
    }

    function setEntries(entries, isPartial, message) {
      allEntries = entries || [];
      rootNodes = buildTree(allEntries);
      rootNodes.forEach(computeNodeStats);
      renderEntries();
      showRetry(Boolean(isPartial));
      if (isPartial && message && partialEl) {
        partialEl.style.display = 'block';
        partialEl.innerHTML = 'Showing a partial entry list. ' + escapeHtml(message) + ' <button id="retryBtnInline" type="button">Retry</button>';
        var retryBtnInline = document.getElementById('retryBtnInline');
        if (retryBtnInline && vscode) {
          retryBtnInline.onclick = function() { vscode.postMessage({ type: 'retryLoad' }); };
        }
      }
    }

    function setError(message) {
      allEntries = [];
      rootNodes = [];
      if (loadingEl) loadingEl.style.display = 'none';
      if (treeEl) treeEl.innerHTML = '';
      if (emptyEl) emptyEl.style.display = 'none';
      if (extractAllBtn) extractAllBtn.style.display = 'none';
      updateFolderButtons();
      if (errorEl) {
        errorEl.style.display = 'block';
        errorEl.textContent = message || 'Error';
      }
      setStatus('Could not read archive');
      setSummary('The preview could not be rendered.');
      showRetry(true);
    }

    function installControls() {
      updateFilterButtons();
      filterButtons.forEach(function(button) {
        button.addEventListener('click', function() {
          var nextFilter = button.getAttribute('data-filter') || 'all';
          if (activeFilter === nextFilter) return;
          activeFilter = nextFilter;
          updateFilterButtons();
          renderEntries();
        });
      });
      if (searchInput) {
        searchInput.addEventListener('input', function() {
          searchQuery = (searchInput.value || '').trim().toLowerCase();
          renderEntries();
        });
      }
      if (expandAllBtn) {
        expandAllBtn.addEventListener('click', function() {
          setAllFoldersCollapsed(false);
          renderEntries();
        });
      }
      if (collapseAllBtn) {
        collapseAllBtn.addEventListener('click', function() {
          setAllFoldersCollapsed(true);
          renderEntries();
        });
      }
    }

    installControls();

    var hasInitialData = false;
    var initialEl = document.getElementById('initial-entries');
    if (initialEl && initialEl.textContent) {
      try {
        var data = JSON.parse(initialEl.textContent);
        hasInitialData = true;
        if (data.error) {
          setError(data.error);
        } else {
          setEntries(data.entries || [], data.isPartial, data.message);
        }
      } catch (err) {}
    }

    window.addEventListener('message', function(e) {
      var msg = e.data;
      if (msg.type === 'init') {
        if (vscode) vscode.postMessage({ type: 'getEntries' });
      } else if (msg.type === 'loading') {
        if (loadingEl) loadingEl.style.display = msg.show ? 'flex' : 'none';
        if (msg.show) {
          setStatus('Reading archive');
          setSummary('Loading archive contents...');
          showRetry(false);
        }
      } else if (msg.type === 'error') {
        setError(msg.message || 'Error');
      } else if (msg.type === 'entries') {
        setEntries(msg.entries || [], msg.isPartial, msg.message);
      } else if (msg.type === 'openResult' || msg.type === 'extractResult') {
        if (msg.success === false && msg.error) {
          if (partialEl) {
            partialEl.style.display = 'block';
            partialEl.className = 'is-error';
            partialEl.innerHTML = escapeHtml(msg.error);
          }
        } else if (msg.success === true && msg.targetPath) {
          showResultMessage(msg.type === 'openResult' ? 'Opened preview' : 'Extracted to', msg.targetPath);
        }
      }
    });

    if (retryBtn) retryBtn.addEventListener('click', function() { if (vscode) vscode.postMessage({ type: 'retryLoad' }); });
    if (extractAllBtn) extractAllBtn.addEventListener('click', function() { if (vscode) vscode.postMessage({ type: 'extractAll' }); });
    if (vscode && !hasInitialData) {
      vscode.postMessage({ type: 'getEntries' });
    }
  </script>
</body>
</html>
